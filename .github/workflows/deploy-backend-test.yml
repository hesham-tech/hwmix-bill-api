name: Deploy Laravel Backend to Test Subdomain (SSH)

on:
  push:
    branches:
      - restructure-v2 # هذا هو البرانش الذي تعمل عليه حالياً

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACA6g37ShyPiZgfHaFfVnmicCN5PLQIWh4/t247UWaQcEAAAAIgdHZUuHR2V
            LgAAAAtzc2gtZWQyNTUxOQAAACA6g37ShyPiZgfHaFfVnmicCN5PLQIWh4/t247UWaQcEA
            AAAEBclRKUG/1G65MQ0XImU2COe0ZPBRsZaFhBvYsDc2sHlDqDftKHI+JmB8doV9WeaJwI
            3k8tAhaHj+3bjtRZpBwQAAAABWh3bml4
            -----END OPENSSH PRIVATE KEY-----

      - name: Deploy via Rsync
        run: |
          rsync -avz --delete -e "ssh -p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15" \
          --rsync-path="mkdir -p /home/u715355537/domains/hwnix.com/public_html/api-teste/ && rsync" \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='node_modules/' \
          --exclude='tests/' \
          --exclude='storage/' \
          --exclude='public/storage' \
          --exclude='.env' \
          --exclude='phpunit.xml' \
          --exclude='README.md' \
          ./ u715355537@212.107.17.234:/home/u715355537/domains/hwnix.com/public_html/api-teste/

      - name: Run Post-Deployment Commands
        run: |
          ssh -p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=15 u715355537@212.107.17.234 << 'EOF'
            set -e
            cd /home/u715355537/domains/hwnix.com/public_html/api-teste
            echo "🚀 Running Database Migrations..."
            php artisan migrate --force
            echo "🔑 Seeding Permissions..."
            php artisan db:seed --class=PermissionsSeeder --force
            echo "⚖️ Seeding Legal Documents..."
            echo 'if (\DB::table("legal_documents")->count() === 0) \Artisan::call("db:seed", ["--class" => "Modules\\Legal\\database\\seeders\\LegalDatabaseSeeder", "--force" => true]);' | php artisan tinker
            echo "🧹 Resetting and Clearing Caches..."
            php artisan permission:cache-reset
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            echo "📦 Rebuilding Composer Autoloader..."
            composer dump-autoload -o
            echo "⚡ Optimizing Application..."
            php artisan config:cache
            php artisan route:cache
            php artisan optimize
            echo "🚀 Post-deployment finished successfully!"
          EOF

      - name: Deployment Complete
        run: echo "✅ Deployment successful! Migrations run, caches cleared, and application optimized."
